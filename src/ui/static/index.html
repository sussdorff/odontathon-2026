<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Billing Coach — Odontathon 2026</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <h1>🦷 Billing Coach</h1>
    <span class="subtitle">Zahnärztliche Abrechnungsprüfung</span>
  </header>

  <main>
    <!-- Full-width top: Patient & Billing -->
    <section class="panel full-width" id="input-panel">
      <h2>Patient & Abrechnung</h2>

      <div class="form-group">
        <label for="patient-select">Patient</label>
        <select id="patient-select">
          <option value="">— Patient wählen —</option>
        </select>
      </div>

      <div id="patient-info" class="patient-info hidden"></div>

      <div id="case-context" class="hidden">
        <div class="form-group">
          <label>
            Fallkontext
            <button class="btn-toggle" id="context-toggle" onclick="toggleContext()">▼</button>
          </label>
          <div id="case-context-body" class="case-context-body">
            <div class="context-grid">
              <div id="context-coverage" class="context-section"></div>
              <div id="context-findings" class="context-section"></div>
              <div id="context-conditions" class="context-section"></div>
              <div id="context-history" class="context-section"></div>
            </div>
          </div>
        </div>
      </div>

      <div id="date-section" class="hidden">
        <div class="form-group">
          <label for="date-select">Rechnung zur Analyse auswählen</label>
          <select id="date-select">
            <option value="">— Rechnung wählen —</option>
          </select>
        </div>
      </div>

      <div id="billing-section" class="hidden">
        <div id="selected-claim-header" class="selected-claim-header"></div>

        <div class="form-group">
          <label>Positionen zur Prüfung</label>
          <div id="billing-items"></div>
          <div class="billing-actions">
            <button class="btn-secondary" onclick="addBillingRow()">+ Manuelle Position</button>
          </div>
        </div>

        <div id="prior-history" class="hidden">
          <label>Vorige Abrechnungen <span class="ctx-count">(für Frequenzprüfung)</span></label>
          <div id="prior-history-content"></div>
        </div>

        <button class="btn-primary" id="analyze-btn" onclick="startAnalysis()" disabled>Analyse starten</button>
      </div>
    </section>

    <!-- Bottom row: Flow + Report + Rules -->
    <div class="bottom-row">
      <section class="panel" id="flow-panel">
        <h2>
          Ausführungsablauf
          <span id="flow-status" class="flow-status hidden">
            <span class="spinner-sm"></span>
            <span id="flow-status-text"></span>
          </span>
        </h2>
        <div id="flow-timeline"></div>
      </section>

      <div class="bottom-right">
        <section class="panel" id="report-panel">
          <h2>Ergebnis</h2>
          <div id="report-content"><p class="muted">Analyse starten um Ergebnis zu sehen.</p></div>
        </section>

        <section class="panel" id="rules-panel">
          <h2>Praxisregeln</h2>
          <div id="rules-list"></div>
          <button class="btn-secondary" onclick="loadRules()">Regeln laden</button>
        </section>
      </div>
    </div>
  </main>

  <script src="/app.js"></script>
</body>
</html>
